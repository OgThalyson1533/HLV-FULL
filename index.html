<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="TrainOS — Sistema de Gestão de Escola de Treinamentos" />
  <title>TrainOS · Gestão de Treinamentos</title>

  <!-- Material Symbols (ícones) -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,300,1,0" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Estilos do sistema -->
  <link rel="stylesheet" href="./css/style.css" />

  <!-- Favicon inline SVG -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>" />
</head>
<body>

  <!-- Root da SPA -->
  <div id="root">
    <!-- Estado de carregamento inicial -->
    <div style="
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      flex-direction: column;
      gap: 16px;
      color: #8b949e;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
    ">
      <div style="
        width: 40px; height: 40px;
        border: 2px solid rgba(0,212,255,0.2);
        border-top-color: #00d4ff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      "></div>
      <span>Iniciando TrainOS...</span>
    </div>
  </div>

  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <!-- Bootstrap do app via ES Modules -->
  <script type="module" src="./js/app.js"></script>

</body>
</html>
